<div class="landing"> <!-- Contenedor principal de la pantalla de inicio -->

  <div class="logo">
    FORMULARIO KATÓDICO <!-- Título o logo de la página -->
  </div>

  <!-- BOTÓN PRINCIPAL -->
  <button class="main-btn" (click)="irFormulario()">
    Crear pedido personalizado <!-- Botón que lleva al formulario -->
  </button>

  <!-- ACCIONES SECUNDARIAS -->
  <div class="actions"> <!-- Contenedor de botones secundarios -->

    <button class="icon-btn" (click)="irEstado()">
      Comprobar pedido <!-- Botón para ver el estado de un pedido -->
    </button>

    <button class="icon-btn" (click)="irConfig()">
      ⚙ <!-- Botón de configuración -->
    </button>

  </div>

</div>
